<template>
    <template if:true={isOpen}>
        <section role="dialog" tabindex="-1" aria-modal="true" aria-label={title}
            class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                        title="Close" onclick={handleClose}>
                        <lightning-icon icon-name="utility:close" size="small"></lightning-icon>
                        <span class="slds-assistive-text">Close</span>
                    </button>
                    <h2 class="slds-text-heading_medium slds-hyphenate">{title}</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <slot></slot>
                </div>
                <footer class="slds-modal__footer">
                    <button class="slds-button slds-button_neutral" onclick={handleClose}>Cancel</button>
                    <button class="slds-button slds-button_brand" onclick={handleConfirm}>{confirmLabel}</button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open" onclick={handleClose}></div>
    </template>
</template>
